zabbix_export:
  version: '6.4'
  template_groups:
    - uuid: 1d12408342854fd5a4436dd6d5d1bd4a
      name: Templates/Telephony
  templates:
    - uuid: f4990f9a568d4d8abfb6f972fd3e40e8
      template: 'MikoPBX monitoring'
      name: 'MikoPBX monitoring'
      groups:
        - name: Templates/Telephony
      items:
        - uuid: 122ccdda2a6544ccb61bcc29c0064f7a
          name: 'MikoPBX: Active calls'
          key: 'asterisk[callsActive]'
          history: 7d
          units: calls
          description: 'The number of active calls at the moment.'
        - uuid: 8b1a6cbc57584eb1948da54fbf959dcf
          name: 'MikoPBX: Calls processed'
          key: 'asterisk[callsProcessed]'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'The number of calls processed after the last service restart.'
        - uuid: 3b49a30b1b164814b3bad48e5aed4d79
          name: 'MikoPBX: Active channels'
          key: 'asterisk[channelsActive]'
          history: 7d
          units: channels
          description: 'The number of active channels at the moment.'
        - uuid: 7749241c7eb849acac1b8453cc7191ee
          name: 'MikoPBX: Count active SIP peers'
          key: 'asterisk[CountActivePeers]'
          history: 7d
          units: peers
          description: 'The number of active SIP peers registered on the PBX.'
        - uuid: 3254841a3e4847fa983bacf6deeaaa96
          name: 'MikoPBX: Count active trunks'
          key: 'asterisk[CountActiveProviders]'
          history: 7d
          units: trunks
          description: 'The number of SIP trunks with active registration.'
        - uuid: f29a0bf340054c0296c3a96db7b06556
          name: 'MikoPBX: Count incoming calls'
          key: 'asterisk[countInCalls]'
          history: 7d
          units: calls
          description: 'The number of active incoming calls at the moment.'
        - uuid: e73ed8ab1ddb4baeaf5fabd281dac6b7
          name: 'MikoPBX: Count inner calls'
          key: 'asterisk[countInnerCalls]'
          history: 7d
          units: calls
          description: 'The number of active internal calls at the moment.'
        - uuid: b001fbc421e24c43ad81b43699cd8902
          name: 'MikoPBX: Count non active trunks'
          key: 'asterisk[CountNonActiveProviders]'
          history: 7d
          units: trunks
          description: 'The number of SIP trunks with failed or lost registration.'
        - uuid: 658f5fd7fa094193ad6212141ef32282
          name: 'MikoPBX: Count outgoing calls'
          key: 'asterisk[countOutCalls]'
          history: 7d
          units: calls
          description: 'The number of active outgoing calls at the moment.'
        - uuid: dd904418bed9483497a7e9cf44256103
          name: 'MikoPBX: SIP peers count'
          key: 'asterisk[countSipPeers]'
          history: 7d
          units: peers
          description: 'Total number of SIP extensions configured on the PBX.'
        - uuid: 84e98b4e6c53487b96afe205e05055b8
          name: 'MikoPBX: Asterisk last reload'
          key: 'asterisk[statusReload]'
          history: 180d
          trends: '0'
          value_type: TEXT
          description: 'Time elapsed since the last Asterisk reload.'
        - uuid: 19524424a4f940ada1e0e33eddf92256
          name: 'MikoPBX: Uptime after reload'
          key: 'asterisk[statusUptime]'
          history: 7d
          trends: '0'
          value_type: TEXT
          description: 'System uptime of Asterisk service.'
        - uuid: 2a394e224dea41c381273d7bffc28e15
          name: 'MikoPBX: Asterisk started'
          key: 'asterisk[status]'
          history: 7d
          description: 'Asterisk process status: 1 — running, 0 — stopped.'
        - uuid: 03834698b7e84af286093c44234b3b32
          name: 'MikoPBX: Asterisk version'
          key: 'asterisk[version]'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Asterisk version string.'
        - uuid: 79923cd175d24afd87e71a895100eb65
          name: 'MikoPBX: Storage total size'
          key: 'vfs.fs.size[/storage,total]'
          delay: 5m
          history: 90d
          units: B
          description: 'Total size of /storage filesystem.'
        - uuid: 4a7b032fafe04fd5abe19490a13d08e1
          name: 'MikoPBX: Storage used space'
          key: 'vfs.fs.size[/storage,used]'
          delay: 5m
          history: 90d
          units: B
          description: 'Used space on /storage filesystem.'
        - uuid: 0a73948e0d6d4412a85b613b93f62fa8
          name: 'MikoPBX: Storage free space'
          key: 'vfs.fs.size[/storage,free]'
          delay: 5m
          history: 90d
          units: B
          description: 'Free space on /storage filesystem.'
        - uuid: 4199b3f05911477c819d16c6a6783f8d
          name: 'MikoPBX: Storage free (%)'
          key: 'vfs.fs.size[/storage,pfree]'
          delay: 5m
          history: 90d
          units: '%'
          value_type: FLOAT
          description: 'Percentage of free space on /storage filesystem.'
      discovery_rules:
        - uuid: 1a14eb932be443938dc49eb2b563d5e9
          name: 'SIP trunk discovery'
          key: 'asterisk[discoveryTrunks]'
          delay: 1h
          lifetime: 7d
          description: 'Discovers SIP trunks registered on the PBX and monitors each trunk individually.'
          item_prototypes:
            - uuid: 1bcf56090a68414b86887fd8594dcb13
              name: 'Trunk {#TRUNKNAME}: Registration status'
              key: 'asterisk[trunkStatus,{#TRUNKID}]'
              delay: 1m
              history: 7d
              trends: '0'
              value_type: CHAR
              description: 'Registration status of SIP trunk {#TRUNKNAME} ({#TRUNKHOST}).'
            - uuid: 10496e76fff548be8b9af4c099c0e211
              name: 'Trunk {#TRUNKNAME}: Incoming calls per hour'
              key: 'asterisk[trunkCalls,{#TRUNKID},hour,incoming,totalCalls]'
              delay: 5m
              history: 90d
              units: calls
              description: 'Total incoming calls through trunk {#TRUNKNAME} in the last hour.'
            - uuid: aa373da9ef284691b7e297ee7877e6d2
              name: 'Trunk {#TRUNKNAME}: Outgoing calls per hour'
              key: 'asterisk[trunkCalls,{#TRUNKID},hour,outgoing,totalCalls]'
              delay: 5m
              history: 90d
              units: calls
              description: 'Total outgoing calls through trunk {#TRUNKNAME} in the last hour.'
            - uuid: 20a6f13caac54bd2b1353e872da1b576
              name: 'Trunk {#TRUNKNAME}: Incoming calls per day'
              key: 'asterisk[trunkCalls,{#TRUNKID},day,incoming,totalCalls]'
              delay: 15m
              history: 365d
              units: calls
              description: 'Total incoming calls through trunk {#TRUNKNAME} in the last 24 hours.'
            - uuid: 8848d03d4588494ba21a330f96f91aef
              name: 'Trunk {#TRUNKNAME}: Outgoing calls per day'
              key: 'asterisk[trunkCalls,{#TRUNKID},day,outgoing,totalCalls]'
              delay: 15m
              history: 365d
              units: calls
              description: 'Total outgoing calls through trunk {#TRUNKNAME} in the last 24 hours.'
            - uuid: 6126dba7f53644a3b0153aec3be5cc9c
              name: 'Trunk {#TRUNKNAME}: Answered incoming per hour'
              key: 'asterisk[trunkCalls,{#TRUNKID},hour,incoming,answeredCalls]'
              delay: 5m
              history: 90d
              units: calls
              description: 'Answered incoming calls through trunk {#TRUNKNAME} in the last hour.'
            - uuid: 64b5ff8f011746ceba03c117018370c3
              name: 'Trunk {#TRUNKNAME}: Answered outgoing per hour'
              key: 'asterisk[trunkCalls,{#TRUNKID},hour,outgoing,answeredCalls]'
              delay: 5m
              history: 90d
              units: calls
              description: 'Answered outgoing calls through trunk {#TRUNKNAME} in the last hour.'
          trigger_prototypes:
            - uuid: c6465555b2574d609844c60dd7678092
              expression: 'last(/MikoPBX monitoring/asterisk[trunkStatus,{#TRUNKID}])<>"OK" and last(/MikoPBX monitoring/asterisk[trunkStatus,{#TRUNKID}])<>"REGISTERED" and last(/MikoPBX monitoring/asterisk[trunkStatus,{#TRUNKID}])<>"OFF"'
              name: 'Trunk {#TRUNKNAME}: not registered ({ITEM.LASTVALUE})'
              priority: AVERAGE
              description: 'SIP trunk {#TRUNKNAME} ({#TRUNKHOST}) is not registered. Current state: {ITEM.LASTVALUE}.'
          graph_prototypes:
            - uuid: f8f319b831364b2b906839ce67aecd91
              name: 'Trunk {#TRUNKNAME}: Calls per hour'
              graph_items:
                - color: 00AA00
                  item:
                    host: 'MikoPBX monitoring'
                    key: 'asterisk[trunkCalls,{#TRUNKID},hour,incoming,totalCalls]'
                - sortorder: '1'
                  color: 0000CC
                  item:
                    host: 'MikoPBX monitoring'
                    key: 'asterisk[trunkCalls,{#TRUNKID},hour,outgoing,totalCalls]'
                - sortorder: '2'
                  color: 00CC00
                  drawtype: DASHED_LINE
                  item:
                    host: 'MikoPBX monitoring'
                    key: 'asterisk[trunkCalls,{#TRUNKID},hour,incoming,answeredCalls]'
                - sortorder: '3'
                  color: 0000FF
                  drawtype: DASHED_LINE
                  item:
                    host: 'MikoPBX monitoring'
                    key: 'asterisk[trunkCalls,{#TRUNKID},hour,outgoing,answeredCalls]'
  triggers:
    - uuid: ea87bcbc59324c4590db73acdcaf1739
      expression: 'last(/MikoPBX monitoring/asterisk[status])=0'
      name: 'MikoPBX: Asterisk is not running'
      priority: HIGH
      description: 'Asterisk process is not detected on the PBX.'
    - uuid: 70b0328c044346d7a4a08121bc9e38f4
      expression: 'last(/MikoPBX monitoring/asterisk[CountNonActiveProviders])>0'
      name: 'MikoPBX: Non-active trunks detected ({ITEM.LASTVALUE})'
      priority: AVERAGE
      description: 'One or more SIP trunks have failed or lost registration.'
    - uuid: 8bc2e67004594c1389e705796e5068b6
      expression: 'last(/MikoPBX monitoring/asterisk[CountActivePeers])=0'
      name: 'MikoPBX: No active SIP peers'
      priority: WARNING
      description: 'No SIP peers are currently registered on the PBX.'
    - uuid: f73cb98c09c940d39f3540ce41da16b2
      expression: 'nodata(/MikoPBX monitoring/asterisk[status],10m)=1'
      name: 'MikoPBX: No data received from Zabbix agent'
      priority: HIGH
      description: 'Zabbix agent on MikoPBX is not responding for 10 minutes.'
    - uuid: 2eaffb0d5d6e4d778614c0adfa55cfe8
      expression: 'last(/MikoPBX monitoring/vfs.fs.size[/storage,pfree])<10'
      name: 'MikoPBX: Storage free space less than 10%'
      priority: WARNING
      description: 'Free space on /storage is below 10%.'
    - uuid: 91635e760c234540ba53343073598fe2
      expression: 'last(/MikoPBX monitoring/vfs.fs.size[/storage,pfree])<5'
      name: 'MikoPBX: Storage free space less than 5%'
      priority: HIGH
      description: 'Free space on /storage is critically low — below 5%.'
  graphs:
    - uuid: 0707e19812c14e1e9ce85143a655017e
      name: 'MikoPBX: Calls overview'
      graph_items:
        - color: 00AA00
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[callsActive]'
        - sortorder: '1'
          color: 0000CC
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[countInCalls]'
        - sortorder: '2'
          color: CC0000
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[countOutCalls]'
        - sortorder: '3'
          color: CC00CC
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[countInnerCalls]'
    - uuid: 1edd0083ae92431da1c9ca6dc96420fb
      name: 'MikoPBX: SIP endpoints'
      graph_items:
        - color: 00AA00
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[CountActivePeers]'
        - sortorder: '1'
          color: 0000CC
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[CountActiveProviders]'
        - sortorder: '2'
          color: CC0000
          item:
            host: 'MikoPBX monitoring'
            key: 'asterisk[CountNonActiveProviders]'
    - uuid: d0a14618ddd34b95ac4b813e1f9a43bd
      name: 'MikoPBX: Storage usage'
      graph_items:
        - color: 00AA00
          item:
            host: 'MikoPBX monitoring'
            key: 'vfs.fs.size[/storage,total]'
        - sortorder: '1'
          color: CC0000
          item:
            host: 'MikoPBX monitoring'
            key: 'vfs.fs.size[/storage,used]'
        - sortorder: '2'
          color: 0000CC
          item:
            host: 'MikoPBX monitoring'
            key: 'vfs.fs.size[/storage,free]'
