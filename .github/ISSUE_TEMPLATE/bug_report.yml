name: Bug Report
description: Report a bug in ModuleZabbixAgent5
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
  - type: input
    id: mikopbx-version
    attributes:
      label: MikoPBX Version
      placeholder: "e.g., 2025.1.1"
    validations:
      required: true
  - type: input
    id: module-version
    attributes:
      label: Module Version
      placeholder: "e.g., 1.27"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64 (x86_64)
        - arm64 (aarch64)
    validations:
      required: true
  - type: input
    id: zabbix-server-version
    attributes:
      label: Zabbix Server Version
      placeholder: "e.g., 6.0.30"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: "Paste logs from /storage/usbdisk1/mikopbx/log/ModuleZabbixAgent5/"
      render: text
    validations:
      required: false
